<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Remember This">
<meta name="theme-color" content="#0a0a0a">
<title>Remember This</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f0;
    --muted: #666;
    --accent: #e8ff5a;
    --accent-dark: #b8cc30;
    --danger: #ff4d4d;
    --btn-hue: 72deg;
    --btn-sat: 100%;
    --btn-light: 67%;
    --btn-color: hsl(var(--btn-hue), var(--btn-sat), var(--btn-light));
    --btn-blur: 0;
    --radius: 14px;
    --font-main: 'Sora', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100dvh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    backdrop-filter: blur(20px);
  }

  .header-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .add-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .add-btn:active { transform: scale(0.9); }
  .add-btn svg { width: 18px; height: 18px; stroke: #000; stroke-width: 2.5; }

  /* ── SITE LIST ── */
  .list {
    flex: 1;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    padding: 60px 20px;
    text-align: center;
  }
  .empty-state .big-icon { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-size: 14px; line-height: 1.6; max-width: 220px; }
  .empty-state span { font-size: 12px; color: var(--muted); opacity: 0.6; font-family: var(--font-mono); }

  /* ── SITE CARD ── */
  .site-card {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    animation: slideIn 0.25s ease;
    user-select: none;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .site-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    border: none;
    cursor: pointer;
    text-align: left;
    position: relative;
    overflow: hidden;
    transition: filter 0.15s, transform 0.15s;
    border-radius: var(--radius);
    background: var(--btn-color);
    backdrop-filter: blur(calc(var(--btn-blur) * 1px));
    -webkit-backdrop-filter: blur(calc(var(--btn-blur) * 1px));
  }

  .site-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    filter: blur(0);
    z-index: 0;
  }

  .site-btn.blur-mode {
    background: hsla(var(--btn-hue), 60%, 20%, 0.45) !important;
    border: 1px solid hsla(var(--btn-hue), 60%, 50%, 0.2);
  }

  .site-btn:active {
    transform: scale(0.98);
    filter: brightness(0.92);
  }

  .site-favicon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(0,0,0,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative; z-index: 1;
  }
  .site-favicon img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

  .site-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
  .site-name {
    font-weight: 600;
    font-size: 15px;
    color: rgba(0,0,0,0.85);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .site-domain {
    font-family: var(--font-mono);
    font-size: 10px;
    color: rgba(0,0,0,0.45);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .site-arrow {
    position: relative; z-index: 1;
    opacity: 0.4;
  }
  .site-arrow svg { width: 16px; height: 16px; stroke: rgba(0,0,0,0.6); stroke-width: 2; }

  /* ── LONG PRESS OVERLAY ── */
  .detail-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-top: -4px;
    animation: expandDown 0.2s ease;
  }
  .detail-panel.open { display: block; }

  @keyframes expandDown {
    from { opacity: 0; transform: scaleY(0.9); transform-origin: top; }
    to { opacity: 1; transform: scaleY(1); }
  }

  .detail-url {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 10px;
    word-break: break-all;
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .detail-url::before { content: '→'; flex-shrink: 0; margin-top: 1px; }

  .detail-note, .detail-what {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    opacity: 0.8;
    margin-bottom: 8px;
  }
  .detail-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .detail-actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .detail-action-btn {
    flex: 1;
    padding: 9px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--font-main);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .detail-action-btn:hover { background: #2a2a2a; }
  .detail-action-btn.danger { color: var(--danger); border-color: rgba(255,77,77,0.2); }

  /* ── RIPPLE ── */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(0,0,0,0.15);
    transform: scale(0);
    animation: rippleOut 0.5s linear;
    pointer-events: none;
  }
  @keyframes rippleOut {
    to { transform: scale(4); opacity: 0; }
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    width: 100%;
    max-width: 520px;
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 40px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 90dvh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 24px;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 22px;
    color: var(--text);
  }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
  }
  .field textarea { height: 80px; line-height: 1.5; }

  .field-optional {
    font-size: 10px;
    color: var(--muted);
    opacity: 0.6;
    float: right;
    font-weight: 400;
    letter-spacing: 0;
    text-transform: none;
  }

  .save-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    font-family: var(--font-main);
    font-size: 15px;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, background 0.15s;
  }
  .save-btn:active { transform: scale(0.98); }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── SETTINGS PANEL ── */
  .settings-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .settings-overlay.open { display: flex; }

  .settings-panel {
    background: var(--surface);
    width: 100%;
    max-width: 520px;
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 48px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .settings-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .settings-section {
    margin-bottom: 28px;
  }
  .settings-section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Color picker row */
  .color-grid {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .color-swatch.active {
    border-color: white;
    transform: scale(1.15);
  }
  .color-swatch:active { transform: scale(0.9); }

  /* Custom hue slider */
  .hue-slider-wrap {
    margin-top: 14px;
  }
  .hue-slider-wrap label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input[type=range] {
    width: 100%;
    height: 8px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
    background: linear-gradient(to right,
      hsl(0,100%,60%), hsl(30,100%,60%), hsl(60,100%,60%),
      hsl(90,100%,60%), hsl(120,100%,60%), hsl(150,100%,60%),
      hsl(180,100%,60%), hsl(210,100%,60%), hsl(240,100%,60%),
      hsl(270,100%,60%), hsl(300,100%,60%), hsl(330,100%,60%), hsl(360,100%,60%)
    );
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    border: 2px solid rgba(0,0,0,0.2);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--surface2);
    border-radius: 12px;
  }
  .toggle-label {
    font-size: 14px;
    font-weight: 500;
  }
  .toggle-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .toggle {
    width: 46px; height: 26px;
    border-radius: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--muted);
    transition: transform 0.2s, background 0.2s;
  }
  .toggle.on {
    background: var(--accent);
    border-color: var(--accent);
  }
  .toggle.on::after {
    transform: translateX(20px);
    background: #000;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    padding: 14px 20px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--bg);
  }
  .settings-trigger {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 9px 16px;
    color: var(--muted);
    font-family: var(--font-main);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .settings-trigger:hover { border-color: var(--accent); color: var(--text); }
  .settings-trigger svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; }

  /* ── DRAG HANDLE / REORDER ── */
  .drag-handle {
    display: flex; align-items: center; justify-content: center;
    padding: 0 6px 0 0;
    opacity: 0.25;
    cursor: grab;
    position: relative; z-index: 1;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle svg { width: 16px; height: 16px; stroke: rgba(0,0,0,0.6); stroke-width: 1.5; }

  /* blur mode text fix */
  .blur-mode .site-name { color: rgba(255,255,255,0.9) !important; }
  .blur-mode .site-domain { color: rgba(255,255,255,0.4) !important; }
  .blur-mode .site-arrow svg { stroke: rgba(255,255,255,0.5) !important; }
  .blur-mode .drag-handle svg { stroke: rgba(255,255,255,0.4) !important; }

  /* ── LONG PRESS HINT ── */
  .press-hint {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.1s;
    pointer-events: none;
    z-index: 2;
  }
  .site-card.pressing .press-hint { opacity: 1; }
  .press-hint-text {
    font-size: 11px;
    font-weight: 600;
    color: white;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Lightness slider */
  .lightness-slider-wrap {
    margin-top: 12px;
  }
  .lightness-slider-wrap label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  #lightnessSlider {
    background: linear-gradient(to right, #000, hsl(var(--btn-hue), 100%, 50%), #fff);
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <span class="header-title">Remember This</span>
  <span class="header-count" id="siteCount">0 sites</span>
  <button class="add-btn" id="openAddModal" title="Add website">
    <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- SITE LIST -->
<div class="list" id="siteList">
  <div class="empty-state" id="emptyState">
    <div class="big-icon">🔖</div>
    <p>No sites saved yet. Tap + to add your first one.</p>
    <span>Tap to visit · Hold to inspect</span>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="settings-trigger" id="openSettings">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Customise
  </button>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add Website</div>

    <div class="field">
      <label>Website Name <span class="field-optional">required</span></label>
      <input type="text" id="inputName" placeholder="e.g. Hacker News" autocomplete="off">
    </div>

    <div class="field">
      <label>URL <span class="field-optional">required</span></label>
      <input type="url" id="inputUrl" placeholder="https://news.ycombinator.com" autocomplete="off" inputmode="url">
    </div>

    <div class="field">
      <label>Why did you add it? <span class="field-optional">optional</span></label>
      <textarea id="inputNote" placeholder="e.g. Best source for tech news and indie projects"></textarea>
    </div>

    <div class="field">
      <label>What does it do? <span class="field-optional">optional</span></label>
      <textarea id="inputWhat" placeholder="e.g. Community-driven link aggregator with discussions"></textarea>
    </div>

    <button class="save-btn" id="saveBtn">Add Site</button>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="modal-handle"></div>
    <div class="settings-title">Customise</div>

    <div class="settings-section">
      <div class="settings-section-label">Button Colour</div>
      <div class="color-grid" id="colorSwatches"></div>
      <div class="hue-slider-wrap">
        <label>Custom hue — <span id="hueVal">72°</span></label>
        <input type="range" id="hueSlider" min="0" max="360" value="72">
      </div>
      <div class="lightness-slider-wrap">
        <label>Lightness — <span id="lightnessVal">67%</span></label>
        <input type="range" id="lightnessSlider" min="30" max="90" value="67">
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-label">Style</div>
      <div class="toggle-row">
        <div>
          <div class="toggle-label">Frosted Glass</div>
          <div class="toggle-sub">Blur + transparency effect</div>
        </div>
        <div class="toggle" id="blurToggle"></div>
      </div>
    </div>

    <button class="save-btn" id="closeSettings" style="background: var(--surface2); color: var(--text); border: 1px solid var(--border);">Done</button>
  </div>
</div>

<script>
// ── DATA ──
const PRESETS = [
  { hue: 72,  sat: 100, light: 67, label: 'Lime' },
  { hue: 200, sat: 100, light: 65, label: 'Sky' },
  { hue: 280, sat: 80,  light: 70, label: 'Purple' },
  { hue: 30,  sat: 100, light: 65, label: 'Orange' },
  { hue: 340, sat: 90,  light: 70, label: 'Pink' },
  { hue: 160, sat: 80,  light: 55, label: 'Teal' },
  { hue: 0,   sat: 0,   light: 75, label: 'White' },
];

let sites = JSON.parse(localStorage.getItem('rtw_sites') || '[]');
let settings = JSON.parse(localStorage.getItem('rtw_settings') || JSON.stringify({
  hue: 72, sat: 100, light: 67, blur: false
}));

let editingId = null;
let openDetailId = null;
let longPressTimer = null;
let isLongPress = false;

// ── SAVE ──
function saveSites() { localStorage.setItem('rtw_sites', JSON.stringify(sites)); }
function saveSettings() { localStorage.setItem('rtw_settings', JSON.stringify(settings)); }

// ── APPLY SETTINGS ──
function applySettings() {
  const root = document.documentElement;
  root.style.setProperty('--btn-hue', settings.hue + 'deg');
  root.style.setProperty('--btn-sat', settings.sat + '%');
  root.style.setProperty('--btn-light', settings.light + '%');
  root.style.setProperty('--btn-blur', settings.blur ? '20' : '0');
  root.style.setProperty('--accent', `hsl(${settings.hue}, ${settings.sat}%, ${settings.light}%)`);
  root.style.setProperty('--accent-dark', `hsl(${settings.hue}, ${settings.sat}%, ${Math.max(settings.light - 20, 30)}%)`);
  document.getElementById('hueSlider').value = settings.hue;
  document.getElementById('lightnessSlider').value = settings.light;
  document.getElementById('hueVal').textContent = settings.hue + '°';
  document.getElementById('lightnessVal').textContent = settings.light + '%';
  const blurToggle = document.getElementById('blurToggle');
  blurToggle.classList.toggle('on', settings.blur);
  // Update lightness slider bg
  document.getElementById('lightnessSlider').style.background =
    `linear-gradient(to right, #111, hsl(${settings.hue}, ${settings.sat}%, 60%), #fff)`;
}

// ── FAVICON ──
function getFavicon(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
  } catch { return null; }
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); }
  catch { return url; }
}

function getEmoji(name) {
  const map = { 'github': '🐙', 'google': '🔍', 'youtube': '▶️', 'twitter': '🐦', 'reddit': '🟠',
    'stackoverflow': '📚', 'notion': '📝', 'figma': '🎨', 'claude': '🤖', 'openai': '🤖',
    'netflix': '🎬', 'spotify': '🎵', 'amazon': '📦', 'linkedin': '💼', 'facebook': '📘',
    'instagram': '📸', 'tiktok': '🎵', 'discord': '💬', 'slack': '💬', 'medium': '📖' };
  const key = name.toLowerCase();
  for (const [k, v] of Object.entries(map)) {
    if (key.includes(k)) return v;
  }
  return '🌐';
}

// ── RENDER ──
function render() {
  const list = document.getElementById('siteList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('siteCount');

  count.textContent = sites.length + (sites.length === 1 ? ' site' : ' sites');

  // Clear non-empty-state elements
  const cards = list.querySelectorAll('.site-card');
  cards.forEach(c => c.remove());

  empty.style.display = sites.length === 0 ? 'flex' : 'none';

  sites.forEach((site, i) => {
    const card = document.createElement('div');
    card.className = 'site-card';
    card.dataset.id = site.id;

    const favicon = getFavicon(site.url);
    const domain = getDomain(site.url);
    const isOpen = openDetailId === site.id;
    const blurClass = settings.blur ? 'blur-mode' : '';

    card.innerHTML = `
      <button class="site-btn ${blurClass}" style="${settings.blur ? '' : `background: hsl(${settings.hue}, ${settings.sat}%, ${settings.light}%)`}">
        <div class="drag-handle" title="Drag to reorder">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="12" r="1" fill="currentColor"/><circle cx="15" cy="12" r="1" fill="currentColor"/><circle cx="9" cy="18" r="1" fill="currentColor"/><circle cx="15" cy="18" r="1" fill="currentColor"/></svg>
        </div>
        <div class="site-favicon" id="fav-${site.id}">
          ${getEmoji(site.name)}
        </div>
        <div class="site-info">
          <div class="site-name">${escHtml(site.name)}</div>
          <div class="site-domain">${escHtml(domain)}</div>
        </div>
        <div class="site-arrow">
          <svg viewBox="0 0 24 24" fill="none"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="press-hint"><span class="press-hint-text">Hold to inspect</span></div>
      </button>
      ${isOpen ? renderDetail(site) : ''}
    `;

    list.appendChild(card);

    // Load favicon image
    if (favicon) {
      const img = new Image();
      img.onload = () => {
        const el = document.getElementById('fav-' + site.id);
        if (el) el.innerHTML = `<img src="${favicon}" alt="">`;
      };
      img.src = favicon;
    }

    // Events
    const btn = card.querySelector('.site-btn');
    setupCardEvents(btn, card, site);
  });
}

function renderDetail(site) {
  return `
    <div class="detail-panel open">
      <div class="detail-url">${escHtml(site.url)}</div>
      ${site.note ? `<div class="detail-label">Why I saved it</div><div class="detail-note">${escHtml(site.note)}</div>` : ''}
      ${site.what ? `<div class="detail-label">What it does</div><div class="detail-what">${escHtml(site.what)}</div>` : ''}
      <div class="detail-actions">
        <button class="detail-action-btn" onclick="editSite('${site.id}')">✏️ Edit</button>
        <button class="detail-action-btn danger" onclick="deleteSite('${site.id}')">🗑 Delete</button>
      </div>
    </div>
  `;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── CARD EVENTS ──
function setupCardEvents(btn, card, site) {
  let startX = 0, startY = 0;

  const startPress = (e) => {
    const touch = e.touches ? e.touches[0] : e;
    startX = touch.clientX; startY = touch.clientY;
    isLongPress = false;
    card.classList.add('pressing');
    longPressTimer = setTimeout(() => {
      isLongPress = true;
      card.classList.remove('pressing');
      navigator.vibrate && navigator.vibrate(30);
      openDetailId = openDetailId === site.id ? null : site.id;
      render();
    }, 500);
  };

  const endPress = (e) => {
    clearTimeout(longPressTimer);
    card.classList.remove('pressing');
    if (!isLongPress) {
      // Tap: ripple + navigate
      addRipple(btn, e);
      setTimeout(() => window.open(site.url, '_blank'), 120);
    }
    isLongPress = false;
  };

  const cancelPress = (e) => {
    if (e.touches) {
      const touch = e.touches[0];
      const dx = Math.abs(touch.clientX - startX);
      const dy = Math.abs(touch.clientY - startY);
      if (dx > 8 || dy > 8) {
        clearTimeout(longPressTimer);
        card.classList.remove('pressing');
      }
    }
  };

  btn.addEventListener('touchstart', startPress, { passive: true });
  btn.addEventListener('touchend', endPress);
  btn.addEventListener('touchmove', cancelPress, { passive: true });
  btn.addEventListener('mousedown', startPress);
  btn.addEventListener('mouseup', endPress);
  btn.addEventListener('mouseleave', () => {
    clearTimeout(longPressTimer);
    card.classList.remove('pressing');
  });
  btn.addEventListener('contextmenu', (e) => e.preventDefault());
}

function addRipple(el, e) {
  const rect = el.getBoundingClientRect();
  const touch = e.changedTouches ? e.changedTouches[0] : e;
  const x = (touch.clientX - rect.left);
  const y = (touch.clientY - rect.top);
  const size = Math.max(rect.width, rect.height) * 1.5;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.cssText = `left:${x - size/2}px;top:${y - size/2}px;width:${size}px;height:${size}px`;
  el.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
}

// ── ADD / EDIT ──
document.getElementById('openAddModal').addEventListener('click', () => {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add Website';
  document.getElementById('saveBtn').textContent = 'Add Site';
  document.getElementById('inputName').value = '';
  document.getElementById('inputUrl').value = '';
  document.getElementById('inputNote').value = '';
  document.getElementById('inputWhat').value = '';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('inputName').focus(), 300);
});

function editSite(id) {
  const site = sites.find(s => s.id === id);
  if (!site) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Website';
  document.getElementById('saveBtn').textContent = 'Save Changes';
  document.getElementById('inputName').value = site.name;
  document.getElementById('inputUrl').value = site.url;
  document.getElementById('inputNote').value = site.note || '';
  document.getElementById('inputWhat').value = site.what || '';
  document.getElementById('addModal').classList.add('open');
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const name = document.getElementById('inputName').value.trim();
  let url = document.getElementById('inputUrl').value.trim();
  if (!name || !url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  const note = document.getElementById('inputNote').value.trim();
  const what = document.getElementById('inputWhat').value.trim();

  if (editingId) {
    const idx = sites.findIndex(s => s.id === editingId);
    if (idx !== -1) sites[idx] = { ...sites[idx], name, url, note, what };
  } else {
    sites.push({ id: Date.now().toString(), name, url, note, what });
  }

  saveSites();
  document.getElementById('addModal').classList.remove('open');
  openDetailId = null;
  render();
});

function deleteSite(id) {
  if (!confirm('Remove this site?')) return;
  sites = sites.filter(s => s.id !== id);
  openDetailId = null;
  saveSites();
  render();
}

// Close modal on overlay click
document.getElementById('addModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ── SETTINGS ──
document.getElementById('openSettings').addEventListener('click', () => {
  buildColorSwatches();
  applySettings();
  document.getElementById('settingsOverlay').classList.add('open');
});
document.getElementById('closeSettings').addEventListener('click', () => {
  document.getElementById('settingsOverlay').classList.remove('open');
  render();
});
document.getElementById('settingsOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

document.getElementById('blurToggle').addEventListener('click', function() {
  settings.blur = !settings.blur;
  saveSettings();
  applySettings();
  render();
});

document.getElementById('hueSlider').addEventListener('input', function() {
  settings.hue = +this.value;
  saveSettings();
  applySettings();
  render();
});
document.getElementById('lightnessSlider').addEventListener('input', function() {
  settings.light = +this.value;
  saveSettings();
  applySettings();
  render();
});

function buildColorSwatches() {
  const grid = document.getElementById('colorSwatches');
  grid.innerHTML = '';
  PRESETS.forEach(p => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = `hsl(${p.hue}, ${p.sat}%, ${p.light}%)`;
    if (settings.hue === p.hue) sw.classList.add('active');
    sw.title = p.label;
    sw.addEventListener('click', () => {
      settings.hue = p.hue;
      settings.sat = p.sat;
      settings.light = p.light;
      saveSettings();
      applySettings();
      buildColorSwatches();
      render();
    });
    grid.appendChild(sw);
  });
}

  name: 'Remember This',
  short_name: 'Remember',
  start_url: '.',
  display: 'standalone',
  background_color: '#0a0a0a',
  theme_color: '#0a0a0a',
  description: 'Your minimal website launcher with notes',
  icons: [{ src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%230a0a0a"/><text y=".9em" font-size="72" x="14">🔖</text></svg>', sizes: '192x192', type: 'image/svg+xml' }]
};
const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
const manifestUrl = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest'; link.href = manifestUrl;
document.head.appendChild(link);

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('fetch', e => {
      e.respondWith(fetch(e.request).catch(() => new Response('Offline')));
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ── INIT ──
applySettings();
render();
</script>
