<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="WeBDock">
<meta name="theme-color" content="#000000">
<title>WeBDock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--surface:#0d0d0d;--surface2:#1a1a1a;--border:rgba(255,255,255,0.06);--text:#f0f0f0;--muted:#555;--accent:#e8ff5a;--btn-hue:72deg;--btn-sat:100%;--btn-light:67%;--radius:14px;--font-main:'Sora',sans-serif;--font-mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;color:var(--text);font-family:var(--font-main);min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column}
.header{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:#000;z-index:10}
.header-left{display:flex;align-items:center;gap:0}
/* Title with long-press secret */
.header-title{font-size:17px;font-weight:700;letter-spacing:0.02em;cursor:default;user-select:none;padding:6px 8px;border-radius:8px;transition:background 0.1s;position:relative}
.header-title.pressing{background:rgba(255,255,255,0.06)}
/* Progress ring around title while holding */
.title-ring{position:absolute;inset:-4px;border-radius:10px;border:2px solid transparent;transition:border-color 0.1s;pointer-events:none}
.header-right{display:flex;align-items:center;gap:10px}
.header-count{font-family:var(--font-mono);font-size:11px;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:20px}
.settings-icon-btn{width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color 0.15s}
.settings-icon-btn:hover{border-color:var(--accent)}
.settings-icon-btn svg{width:16px;height:16px;stroke:var(--muted);stroke-width:2;fill:none}
/* Squircle add button */
.add-btn{width:36px;height:36px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;flex-shrink:0;border-radius:10px}
.add-btn:active{transform:scale(0.9)}
.add-btn svg{width:18px;height:18px;stroke:#000;stroke-width:2.5;fill:none}
.section-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:12px 18px 5px;display:flex;align-items:center;gap:8px}
.hidden-section{display:none}
.hidden-section.visible{display:block}
.list{flex:1;padding:8px 16px 16px;display:flex;flex-direction:column;gap:8px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);padding:60px 20px;text-align:center}
.empty-state .big-icon{font-size:44px;opacity:0.2}
.empty-state p{font-size:13px;line-height:1.6;max-width:200px}
.empty-state span{font-size:11px;opacity:0.5;font-family:var(--font-mono)}
.site-card{position:relative;border-radius:var(--radius);overflow:hidden;animation:slideIn 0.22s ease;user-select:none}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.site-btn{width:100%;display:flex;align-items:center;gap:14px;padding:14px 16px;border:none;cursor:pointer;text-align:left;position:relative;overflow:hidden;transition:filter 0.12s,transform 0.12s;border-radius:var(--radius)}
.site-btn.blur-mode{background:hsla(var(--btn-hue),50%,15%,0.5)!important;border:1px solid hsla(var(--btn-hue),50%,40%,0.15);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.site-btn:active{transform:scale(0.98);filter:brightness(0.9)}
.pin-badge{position:absolute;top:6px;right:8px;font-size:10px;opacity:0.4;z-index:2}
.site-favicon{width:32px;height:32px;border-radius:8px;background:rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;position:relative;z-index:1}
.site-favicon img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.site-info{flex:1;min-width:0;position:relative;z-index:1}
.site-name{font-weight:600;font-size:14px;color:rgba(0,0,0,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.site-domain{font-family:var(--font-mono);font-size:10px;color:rgba(0,0,0,0.45);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.site-arrow{position:relative;z-index:1;opacity:0.35}
.site-arrow svg{width:15px;height:15px;stroke:rgba(0,0,0,0.6);stroke-width:2;fill:none}
.blur-mode .site-name{color:rgba(255,255,255,0.88)!important}
.blur-mode .site-domain{color:rgba(255,255,255,0.38)!important}
.blur-mode .site-arrow svg{stroke:rgba(255,255,255,0.45)!important}
.close-btn-overlay{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:#ff3b30;display:none;align-items:center;justify-content:center;z-index:10;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.5);animation:popIn 0.15s ease}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.close-btn-overlay.visible{display:flex}
.close-btn-overlay svg{width:12px;height:12px;stroke:#fff;stroke-width:2.5;fill:none}
.detail-panel{display:none;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:16px;animation:expD 0.18s ease}
.detail-panel.open{display:block}
@keyframes expD{from{opacity:0}to{opacity:1}}
.detail-url{font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-bottom:10px;word-break:break-all;display:flex;align-items:flex-start;gap:5px}
.detail-url::before{content:'→';flex-shrink:0}
.detail-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.detail-note,.detail-what{font-size:13px;color:var(--text);line-height:1.5;opacity:0.75;margin-bottom:10px}
.detail-actions{display:flex;gap:8px;margin-top:12px}
.detail-action-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font-main);font-size:12px;font-weight:500;cursor:pointer;transition:background 0.12s}
.detail-action-btn:hover{background:#222}
.detail-action-btn.pin-on{color:var(--accent)}
.detail-action-btn.danger{color:#ff4d4d}
.press-hint{position:absolute;inset:0;background:rgba(0,0,0,0.2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.08s;pointer-events:none;z-index:2}
.site-card.pressing .press-hint{opacity:1}
.press-hint-text{font-size:10px;font-weight:600;color:white;letter-spacing:0.08em;text-transform:uppercase}
.ripple{position:absolute;border-radius:50%;background:rgba(0,0,0,0.12);transform:scale(0);animation:rippleOut 0.5s linear;pointer-events:none}
@keyframes rippleOut{to{transform:scale(4);opacity:0}}
/* Hidden reveal toast */
.reveal-toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-size:12px;color:var(--muted);font-family:var(--font-mono);opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:200;white-space:nowrap}
.reveal-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Hold progress on title */
@keyframes titlePulse{0%,100%{color:var(--text)}50%{color:var(--accent)}}
.header-title.holding{animation:titlePulse 0.5s ease infinite}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:26px 22px 40px;animation:slideUp 0.28s cubic-bezier(0.34,1.4,0.64,1);max-height:92dvh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px}
.modal-title{font-size:19px;font-weight:700;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field-optional{font-size:10px;color:var(--muted);opacity:0.55;float:right;font-weight:400;letter-spacing:0;text-transform:none}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:var(--font-main);font-size:15px;outline:none;transition:border-color 0.12s;resize:none}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{height:70px;line-height:1.5}
.hidden-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border-radius:12px;margin-bottom:14px}
.hidden-toggle-label{font-size:14px;font-weight:500}
.hidden-toggle-sub{font-size:11px;color:var(--muted);margin-top:2px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;position:relative;transition:background 0.18s;flex-shrink:0}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:transform 0.18s,background 0.18s}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle.on::after{transform:translateX(20px);background:#000}
.save-btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:14px;font-family:var(--font-main);font-size:15px;font-weight:700;color:#000;cursor:pointer;margin-top:6px;transition:transform 0.12s}
.save-btn:active{transform:scale(0.98)}
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.settings-overlay.open{display:flex}
.settings-panel{background:var(--surface);width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:26px 22px 48px;animation:slideUp 0.28s cubic-bezier(0.34,1.4,0.64,1)}
.settings-title{font-size:19px;font-weight:700;margin-bottom:22px}
.settings-section{margin-bottom:24px}
.settings-section-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.color-grid{display:flex;gap:10px;flex-wrap:wrap}
.color-swatch{width:38px;height:38px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.12s,border-color 0.12s}
.color-swatch.active{border-color:white;transform:scale(1.15)}
.hue-slider-wrap,.lightness-slider-wrap{margin-top:12px}
.hue-slider-wrap label,.lightness-slider-wrap label{display:block;font-size:11px;color:var(--muted);margin-bottom:7px}
input[type=range]{width:100%;height:7px;border-radius:4px;outline:none;cursor:pointer;-webkit-appearance:none;background:linear-gradient(to right,hsl(0,100%,60%),hsl(60,100%,60%),hsl(120,100%,60%),hsl(180,100%,60%),hsl(240,100%,60%),hsl(300,100%,60%),hsl(360,100%,60%))}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:white;border:2px solid rgba(0,0,0,0.2);box-shadow:0 2px 8px rgba(0,0,0,0.4);cursor:pointer}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--surface2);border-radius:12px}
.toggle-label{font-size:14px;font-weight:500}
.toggle-sub{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <span class="header-title" id="titleHold">WeBDock</span>
  </div>
  <div class="header-right">
    <span class="header-count" id="siteCount">0 sites</span>
    <button class="settings-icon-btn" id="openSettings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="add-btn" id="openAddModal">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
</div>

<!-- Pinned -->
<div id="pinnedSection" style="display:none">
  <div class="section-label"><span>📌</span> Pinned</div>
  <div class="list" id="pinnedList" style="padding-top:0;padding-bottom:4px"></div>
</div>

<!-- Hidden (revealed by holding title) -->
<div id="hiddenSection" class="hidden-section">
  <div class="section-label">👁 Hidden</div>
  <div class="list" id="hiddenList" style="padding-top:0;padding-bottom:4px"></div>
</div>

<!-- Normal -->
<div id="normalSection">
  <div class="list" id="siteList"></div>
</div>

<!-- Toast -->
<div class="reveal-toast" id="revealToast"></div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add Website</div>
    <div class="field"><label>Name <span class="field-optional">required</span></label><input type="text" id="inputName" placeholder="e.g. Hacker News" autocomplete="off"></div>
    <div class="field"><label>URL <span class="field-optional">required</span></label><input type="url" id="inputUrl" placeholder="https://news.ycombinator.com" autocomplete="off" inputmode="url"></div>
    <div class="field"><label>Why did you add it? <span class="field-optional">optional</span></label><textarea id="inputNote" placeholder="e.g. Best source for tech news"></textarea></div>
    <div class="field"><label>What does it do? <span class="field-optional">optional</span></label><textarea id="inputWhat" placeholder="e.g. Community link aggregator"></textarea></div>
    <div class="hidden-toggle-row">
      <div><div class="hidden-toggle-label">Hidden site</div><div class="hidden-toggle-sub">Hold "WeBDock" title 2s to reveal</div></div>
      <div class="toggle" id="hiddenToggleModal"></div>
    </div>
    <button class="save-btn" id="saveBtn">Add Site</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="modal-handle"></div>
    <div class="settings-title">Customise</div>
    <div class="settings-section">
      <div class="settings-section-label">Button Colour</div>
      <div class="color-grid" id="colorSwatches"></div>
      <div class="hue-slider-wrap"><label>Custom hue — <span id="hueVal">72°</span></label><input type="range" id="hueSlider" min="0" max="360" value="72"></div>
      <div class="lightness-slider-wrap"><label>Lightness — <span id="lightnessVal">67%</span></label><input type="range" id="lightnessSlider" min="30" max="90" value="67"></div>
    </div>
    <div class="settings-section">
      <div class="settings-section-label">Style</div>
      <div class="toggle-row"><div><div class="toggle-label">Frosted Glass</div><div class="toggle-sub">Blur + transparency effect</div></div><div class="toggle" id="blurToggle"></div></div>
    </div>
    <button class="save-btn" id="closeSettings" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)">Done</button>
  </div>
</div>

const PRESETS=[{hue:72,sat:100,light:67,label:'Lime'},{hue:200,sat:100,light:65,label:'Sky'},{hue:280,sat:80,light:70,label:'Purple'},{hue:30,sat:100,light:65,label:'Orange'},{hue:340,sat:90,light:70,label:'Pink'},{hue:160,sat:80,light:55,label:'Teal'},{hue:0,sat:0,light:75,label:'White'}];
let sites=JSON.parse(localStorage.getItem('wbd_sites')||'[]');
let settings=JSON.parse(localStorage.getItem('wbd_settings')||JSON.stringify({hue:72,sat:100,light:67,blur:false}));
let editingId=null,openDetailId=null,longPressTimer=null,isLongPress=false,hiddenNewSite=false,hiddenVisible=false;

function saveSites(){localStorage.setItem('wbd_sites',JSON.stringify(sites))}
function saveSettings(){localStorage.setItem('wbd_settings',JSON.stringify(settings))}

function applySettings(){
  const r=document.documentElement;
  r.style.setProperty('--btn-hue',settings.hue+'deg');
  r.style.setProperty('--btn-sat',settings.sat+'%');
  r.style.setProperty('--btn-light',settings.light+'%');
  r.style.setProperty('--accent',`hsl(${settings.hue},${settings.sat}%,${settings.light}%)`);
  document.getElementById('hueSlider').value=settings.hue;
  document.getElementById('lightnessSlider').value=settings.light;
  document.getElementById('hueVal').textContent=settings.hue+'°';
  document.getElementById('lightnessVal').textContent=settings.light+'%';
  document.getElementById('blurToggle').classList.toggle('on',settings.blur);
  document.getElementById('lightnessSlider').style.background=`linear-gradient(to right,#000,hsl(${settings.hue},${settings.sat}%,60%),#fff)`;
}

function getFav(url){try{return`https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`}catch{return null}}
function getDom(url){try{return new URL(url).hostname.replace('www.','')}catch{return url}}
function getEmoji(n){const m={github:'🐙',google:'🔍',youtube:'▶️',twitter:'🐦',reddit:'🟠',stackoverflow:'📚',notion:'📝',figma:'🎨',claude:'🤖',openai:'🤖',netflix:'🎬',spotify:'🎵',amazon:'📦',linkedin:'💼',facebook:'📘',instagram:'📸',discord:'💬',slack:'💬',medium:'📖'};const k=n.toLowerCase();for(const[key,v]of Object.entries(m)){if(k.includes(key))return v}return'🌐'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── TITLE LONG-PRESS (2s) to reveal hidden ──
const titleEl = document.getElementById('titleHold');
let titleTimer = null;
let titleCountdown = null;
let titleHolding = false;

function startTitleHold(e) {
  e.preventDefault();
  titleHolding = true;
  titleEl.classList.add('pressing','holding');
  let remaining = 2000;
  const step = 100;
  titleCountdown = setInterval(() => {
    remaining -= step;
    if (remaining <= 0) clearInterval(titleCountdown);
  }, step);
  titleTimer = setTimeout(() => {
    if (!titleHolding) return;
    titleEl.classList.remove('pressing','holding');
    navigator.vibrate && navigator.vibrate([30,30,60]);
    hiddenVisible = !hiddenVisible;
    render();
    showToast(hiddenVisible ? '👁 Hidden sites revealed' : '👁 Hidden sites concealed');
  }, 2000);
}

function cancelTitleHold() {
  titleHolding = false;
  clearTimeout(titleTimer);
  clearInterval(titleCountdown);
  titleEl.classList.remove('pressing','holding');
}

titleEl.addEventListener('mousedown', startTitleHold);
titleEl.addEventListener('touchstart', startTitleHold, {passive:false});
titleEl.addEventListener('mouseup', cancelTitleHold);
titleEl.addEventListener('mouseleave', cancelTitleHold);
titleEl.addEventListener('touchend', cancelTitleHold);
titleEl.addEventListener('touchcancel', cancelTitleHold);
titleEl.addEventListener('contextmenu', e=>e.preventDefault());

function showToast(msg) {
  const t = document.getElementById('revealToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function render(){
  const pinned=sites.filter(s=>s.pinned&&!s.hidden);
  const hidden=sites.filter(s=>s.hidden);
  const normal=sites.filter(s=>!s.pinned&&!s.hidden);
  const total=pinned.length+normal.length;
  document.getElementById('siteCount').textContent=total+(total===1?' site':' sites');
  const ps=document.getElementById('pinnedSection');
  ps.style.display=pinned.length?'block':'none';
  renderTo('pinnedList',pinned);
  // Hidden section visibility
  document.getElementById('hiddenSection').classList.toggle('visible', hiddenVisible && hidden.length>0);
  renderTo('hiddenList',hidden);
  renderTo('siteList',normal,!sites.length);
}

function renderTo(elId,arr,showEmpty){
  const el=document.getElementById(elId);
  el.innerHTML='';
  if(!arr.length){
    if(showEmpty)el.innerHTML='<div class="empty-state"><div class="big-icon">🔖</div><p>No sites yet. Tap + to add your first.</p><span>Tap to visit · Hold to inspect</span></div>';
    return;
  }
  arr.forEach(site=>{
    const card=document.createElement('div');
    card.className='site-card';
    const fav=getFav(site.url);
    const dom=getDom(site.url);
    const isOpen=openDetailId===site.id;
    const blurC=settings.blur?'blur-mode':'';
    const btnBg=settings.blur?'':` style="background:hsl(${settings.hue},${settings.sat}%,${settings.light}%)"`;
    const pinB=site.pinned?'<span class="pin-badge">📌</span>':'';
    const detail=isOpen?renderDetail(site):'';
    card.innerHTML=`<button class="site-btn ${blurC}"${btnBg}>${pinB}<div class="site-favicon" id="fav-${site.id}">${getEmoji(site.name)}</div><div class="site-info"><div class="site-name">${esc(site.name)}</div><div class="site-domain">${esc(dom)}</div></div><div class="site-arrow"><svg viewBox="0 0 24 24" fill="none"><polyline points="9 18 15 12 9 6"/></svg></div><div class="press-hint"><span class="press-hint-text">Hold to inspect</span></div></button><div class="close-btn-overlay" id="close-${site.id}"><svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>${detail}`;
    el.appendChild(card);
    if(fav){const img=new Image();img.onload=()=>{const fe=document.getElementById('fav-'+site.id);if(fe)fe.innerHTML=`<img src="${fav}" alt="">`;};img.src=fav;}
    setupCard(card.querySelector('.site-btn'),card,site);
    const cb=card.querySelector('#close-'+site.id);
    cb.addEventListener('click',e=>{e.stopPropagation();if(confirm('Remove "'+site.name+'"?')){sites=sites.filter(s=>s.id!==site.id);openDetailId=null;saveSites();render();}});
  });
}

function renderDetail(site){
  const pl=site.pinned?'📌 Unpin':'📌 Pin';
  const pc=site.pinned?'pin-on':'';
  return`<div class="detail-panel open"><div class="detail-url">${esc(site.url)}</div>${site.note?`<div class="detail-label">Why I saved it</div><div class="detail-note">${esc(site.note)}</div>`:''} ${site.what?`<div class="detail-label">What it does</div><div class="detail-what">${esc(site.what)}</div>`:''}<div class="detail-actions"><button class="detail-action-btn ${pc}" onclick="togglePin('${site.id}')">${pl}</button><button class="detail-action-btn" onclick="editSite('${site.id}')">✏️ Edit</button><button class="detail-action-btn danger" onclick="deleteSite('${site.id}')">🗑 Delete</button></div></div>`;
}

function setupCard(btn,card,site){
  let sx=0,sy=0,cardLongPress=false;
  const sp=e=>{const t=e.touches?e.touches[0]:e;sx=t.clientX;sy=t.clientY;cardLongPress=false;card.classList.add('pressing');longPressTimer=setTimeout(()=>{cardLongPress=true;card.classList.remove('pressing');navigator.vibrate&&navigator.vibrate(25);const was=openDetailId===site.id;openDetailId=was?null:site.id;render();const ce=document.getElementById('close-'+site.id);if(ce)ce.classList.toggle('visible',!was);},480);};
  const ep=e=>{clearTimeout(longPressTimer);card.classList.remove('pressing');if(!cardLongPress){addRipple(btn,e);setTimeout(()=>window.open(site.url,'_blank'),110);}cardLongPress=false;};
  const cp=e=>{if(e.touches){const t=e.touches[0];if(Math.abs(t.clientX-sx)>8||Math.abs(t.clientY-sy)>8){clearTimeout(longPressTimer);card.classList.remove('pressing');}}};
  btn.addEventListener('touchstart',sp,{passive:true});
  btn.addEventListener('touchend',ep);
  btn.addEventListener('touchmove',cp,{passive:true});
  btn.addEventListener('mousedown',sp);
  btn.addEventListener('mouseup',ep);
  btn.addEventListener('mouseleave',()=>{clearTimeout(longPressTimer);card.classList.remove('pressing');});
  btn.addEventListener('contextmenu',e=>e.preventDefault());
}

function addRipple(el,e){const r=el.getBoundingClientRect();const t=e.changedTouches?e.changedTouches[0]:e;const sz=Math.max(r.width,r.height)*1.5;const rip=document.createElement('span');rip.className='ripple';rip.style.cssText=`left:${t.clientX-r.left-sz/2}px;top:${t.clientY-r.top-sz/2}px;width:${sz}px;height:${sz}px`;el.appendChild(rip);setTimeout(()=>rip.remove(),600);}
function togglePin(id){const s=sites.find(x=>x.id===id);if(s){s.pinned=!s.pinned;openDetailId=null;saveSites();render();}}
function editSite(id){const s=sites.find(x=>x.id===id);if(!s)return;editingId=id;document.getElementById('modalTitle').textContent='Edit Website';document.getElementById('saveBtn').textContent='Save Changes';document.getElementById('inputName').value=s.name;document.getElementById('inputUrl').value=s.url;document.getElementById('inputNote').value=s.note||'';document.getElementById('inputWhat').value=s.what||'';hiddenNewSite=!!s.hidden;document.getElementById('hiddenToggleModal').classList.toggle('on',hiddenNewSite);document.getElementById('addModal').classList.add('open');}
function deleteSite(id){if(!confirm('Remove this site?'))return;sites=sites.filter(s=>s.id!==id);openDetailId=null;saveSites();render();}
document.getElementById('openAddModal').addEventListener('click',()=>{editingId=null;document.getElementById('modalTitle').textContent='Add Website';document.getElementById('saveBtn').textContent='Add Site';['inputName','inputUrl','inputNote','inputWhat'].forEach(id=>document.getElementById(id).value='');hiddenNewSite=false;document.getElementById('hiddenToggleModal').classList.remove('on');document.getElementById('addModal').classList.add('open');setTimeout(()=>document.getElementById('inputName').focus(),300);});
document.getElementById('hiddenToggleModal').addEventListener('click',function(){hiddenNewSite=!hiddenNewSite;this.classList.toggle('on',hiddenNewSite);});
document.getElementById('saveBtn').addEventListener('click',()=>{const name=document.getElementById('inputName').value.trim();let url=document.getElementById('inputUrl').value.trim();if(!name||!url)return;if(!url.startsWith('http'))url='https://'+url;const note=document.getElementById('inputNote').value.trim();const what=document.getElementById('inputWhat').value.trim();if(editingId){const idx=sites.findIndex(s=>s.id===editingId);if(idx!==-1)sites[idx]={...sites[idx],name,url,note,what,hidden:hiddenNewSite};}else{sites.push({id:Date.now().toString(),name,url,note,what,pinned:false,hidden:hiddenNewSite});}saveSites();document.getElementById('addModal').classList.remove('open');openDetailId=null;render();});
document.getElementById('addModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.getElementById('openSettings').addEventListener('click',()=>{buildSwatches();applySettings();document.getElementById('settingsOverlay').classList.add('open');});
document.getElementById('closeSettings').addEventListener('click',()=>{document.getElementById('settingsOverlay').classList.remove('open');render();});
document.getElementById('settingsOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.getElementById('blurToggle').addEventListener('click',function(){settings.blur=!settings.blur;saveSettings();applySettings();render();});
document.getElementById('hueSlider').addEventListener('input',function(){settings.hue=+this.value;saveSettings();applySettings();render();});
document.getElementById('lightnessSlider').addEventListener('input',function(){settings.light=+this.value;saveSettings();applySettings();render();});
function buildSwatches(){const g=document.getElementById('colorSwatches');g.innerHTML='';PRESETS.forEach(p=>{const sw=document.createElement('div');sw.className='color-swatch'+(settings.hue===p.hue?' active':'');sw.style.background=`hsl(${p.hue},${p.sat}%,${p.light}%)`;sw.title=p.label;sw.addEventListener('click',()=>{settings.hue=p.hue;settings.sat=p.sat;settings.light=p.light;saveSettings();applySettings();buildSwatches();render();});g.appendChild(sw);});}

// PWA — icon only for home screen
const manifestData={name:'WeBDock',short_name:'WeBDock',start_url:'.',display:'standalone',background_color:'#000000',theme_color:'#000000',description:'Your minimal website launcher',icons:[{src:ICON_URL,sizes:'512x512',type:'image/png'}]};
const blob=new Blob([JSON.stringify(manifestData)],{type:'application/json'});
const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(blob);document.head.appendChild(ml);
const al=document.createElement('link');al.rel='apple-touch-icon';al.href=ICON_URL;document.head.appendChild(al);
if('serviceWorker' in navigator){const sw=`self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>new Response('Offline')));});`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});}

applySettings();render();
</script>
</body>
</html>
