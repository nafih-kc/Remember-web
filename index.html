<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="path/to/font.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="shortcut icon" href="path/to/favicon.ico" sizes="16x16"/>
    <title>Search Page</title>
    <style>
        /* Your existing styles */
        body {
            font-family: 'YourFont', sans-serif;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Defer non-critical operations
            setTimeout(() => {
                // Code for non-critical operations
            }, 1000);
        });
    </script>
</head>
<body>
    <main>
        <h1>Search Page</h1>
        <section id="search">
            <h2>Last 5 Searches</h2>
            <ul id="last-searches">
                <!-- Dynamically filled by script -->
            </ul>
        </section>
        <section id="bookmarks" style="display:none;">
            <!-- Bookmarks section hidden -->
        </section>
    </main>
    <script>
        // Example of lazy loading and populating last searches
        const lastSearches = JSON.parse(localStorage.getItem('lastSearches')) || [];
        const lastSearchesList = document.getElementById('last-searches');

        lastSearches.forEach(search => {
            const li = document.createElement('li');
            li.textContent = search;
            lastSearchesList.appendChild(li);
        });
    </script>
</body>
</html>
